; M5RadioStream — winRadio ported to M5Stack Core1 Basic
; Original project by Volos Projects (Waveshare ESP32-S3 Radio)
; Ported for M5Stack Core1 (ESP32, ILI9341 320x240, 3-button)

[env:m5stack-core-esp32]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    m5stack/M5Stack@^0.4.6
    esphome/ESP32-audioI2S@^2.3.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
